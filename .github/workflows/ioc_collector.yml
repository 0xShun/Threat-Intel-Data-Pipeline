name: IOC Feed Collector

on:
  schedule:
    - cron: "0 6 * * *"
    - cron: "0 17 * * *"
  workflow_dispatch:

jobs:
  collect-iocs:
    name: Collect & Commit IOCs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run IOC collector
        env:
          VT_API_KEY:      ${{ secrets.VT_API_KEY }}
          ABUSEIPDB_KEY:   ${{ secrets.ABUSEIPDB_KEY }}
          OTX_API_KEY:     ${{ secrets.OTX_API_KEY }}
          SHODAN_API_KEY:  ${{ secrets.SHODAN_API_KEY }}
          ABUSECH_API_KEY: ${{ secrets.ABUSECH_API_KEY }}

        run: python scripts/collect_iocs.py

      - name: Commit new IOC reports (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add reports/

          if git diff --cached --quiet; then
            echo "No changes to commit — IOC lists are unchanged."
          else
            TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
            git commit -m "chore: update IOC feeds [${TIMESTAMP}]"
            git push
          fi

